name: Dependabot Triage

# Runs when Dependabot opens or updates a PR. Calls Claude via the Anthropic
# GitHub Action and lets it post a sticky MERGE / HOLD / INVESTIGATE verdict
# comment on the PR. The agent definition lives at
# .claude/agents/dependabot-triage.md.
#
# Auth: uses CLAUDE_CODE_OAUTH_TOKEN (provisioned by /install-github-app),
# matching .github/workflows/claude.yml. If you swap to ANTHROPIC_API_KEY,
# update both files together.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  id-token: write

concurrency:
  group: dependabot-triage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Wait for CI to settle
        # Best-effort: give the other CI jobs a chance to start so the
        # `gh pr checks` Claude runs against has something useful to read.
        run: sleep 30

      - name: Triage with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Tell the action it's allowed to run on a Dependabot-authored PR
          # (by default the action skips bot authors).
          allowed_bots: 'dependabot[bot]'
          # Lets Claude inspect Actions / CI status via the API.
          additional_permissions: |
            actions: read
          # Tool allowlist — includes gh pr comment so Claude can post the
          # verdict itself. (use_sticky_comment is the action's progress UI,
          # not a final-output relay.)
          claude_args: '--allowed-tools "Read,Grep,Glob,Bash(gh pr view*),Bash(gh pr diff*),Bash(gh pr checks*),Bash(gh pr comment*),Bash(gh issue view*),Bash(gh run list*),Bash(gh run view*),Bash(git diff*),Bash(git log*),WebFetch"'
          prompt: |
            You are running on a Dependabot PR (#${{ github.event.pull_request.number }}) in repo ${{ github.repository }}.

            Use the `dependabot-triage` subagent (defined in .claude/agents/dependabot-triage.md) to:
              1. Inspect the PR diff via `gh pr diff ${{ github.event.pull_request.number }}`
              2. Read the PR body for changelog / release-note excerpts
              3. Check CI status via `gh pr checks ${{ github.event.pull_request.number }}`
              4. Grep the repo for usages of the bumped package to assess surface area
              5. Decide a verdict — MERGE / HOLD / INVESTIGATE — in the agent's documented format

            Then post the verdict as a PR comment with `gh pr comment ${{ github.event.pull_request.number }} --body-file -`. Start the body with this exact marker line so a human can grep for prior triage comments later:

            <!-- claude-dependabot-triage -->

            Do NOT approve, merge, close, or push to the PR. Only comment.
